name: 數據分析員雲端辦公室

on:
  # 設定定時執行
  schedule:
    # 這裡使用 Cron 語法：'分 時 日 月 週' (這是 UTC 時間)
    # 範例：'0 0 * * *' 代表台北時間每天早上 8:00
    - cron: '0 0 * * *'
  # 允許手動點擊執行按鈕
  workflow_dispatch:

jobs:
  run_analyst:
    runs-on: ubuntu-latest # 使用 GitHub 提供的 Linux 虛擬機

    steps:
      - name: 1. 複製代碼到虛擬機
        uses: actions/checkout@v3

      - name: 2. 安裝 Python 環境
        uses: actions/setup-python@v4
        with:
          python-version: '3.11' # 使用穩定版 3.11

      - name: 3. 安裝必要套件
        run: |
          python -m pip install --upgrade pip
          pip install discord.py httpx numpy pandas pandas-ta aiofiles

      - name: 4. 啟動分析員
        env:
          # 將 GitHub 的秘密密鑰帶入環境變數
          DISCORD_TOKEN: ${{ secrets.DISCORD_TOKEN }}
        run: python DataAnalystAgent.py