name: 數據分析員雲端辦公室

on:
  schedule:
    - cron: '0 0 * * *' # 台北時間早上 8 點
  workflow_dispatch:

jobs:
  run-analyst:
    runs-on: ubuntu-latest
    
    steps:
      - name: 1. 複製倉庫代碼
        uses: actions/checkout@v3

      - name: 2. 設定 Python 環境
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 3. 安裝 Python 依賴套件
        run: |
          python -m pip install --upgrade pip
          # 直接安裝所有核心套件
          pip install discord.py httpx numpy pandas aiofiles
          # 使用 https 直連安裝 pandas-ta，避開 git clone 驗證問題
          pip install https://github.com/twopiradians/pandas-ta/archive/development.zip

      - name: 4. 執行分析員程式
        env:
          DISCORD_TOKEN: ${{ secrets.DISCORD_TOKEN }}
        run: python main.py