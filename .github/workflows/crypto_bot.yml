name: 數據分析員雲端辦公室

# 設定執行時機
on:
  schedule:
    # 每天台北時間早上 8:00 執行 (UTC 00:00)
    - cron: '0 0 * * *'
  # 允許您在 GitHub 網頁上手動點擊 "Run workflow" 測試
  workflow_dispatch:

jobs:
  run-analyst:
    runs-on: ubuntu-latest
    
    # 為了確保 pip 安裝 git 來源套件，虛擬機需要先安裝 git
    steps:
      - name: 1. 複製倉庫代碼
        uses: actions/checkout@v3

      - name: 2. 設定 Python 環境
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          # 建立快取以加快下次執行速度
          cache: 'pip'

      - name: 3. 安裝系統依賴 (git)
        run: sudo apt-get update && sudo apt-get install -y git

      - name: 4. 安裝 Python 依賴套件
        run: |
          python -m pip install --upgrade pip
          # 安裝基礎穩定套件
          pip install discord.py httpx numpy pandas aiofiles
          # 使用 git 來源安裝 pandas-ta 以解決版本匹配問題
          pip install git+https://github.com/twopiradians/pandas-ta.git@development

      - name: 5. 執行分析員程式
        env:
          # 從 GitHub Secrets 讀取密鑰並帶入環境變數
          DISCORD_TOKEN: ${{ secrets.DISCORD_TOKEN }}
        run: python DataAnalystAgent.py