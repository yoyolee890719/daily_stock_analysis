name: 數據分析員雲端辦公室

on:
  schedule:
    # 台北時間每天早上 8:00 執行
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  run-analyst:
    runs-on: ubuntu-latest
    
    steps:
      - name: 1. 複製倉庫代碼
        uses: actions/checkout@v3

      - name: 2. 設定 Python 環境
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: 3. 強制安裝所有套件
        run: |
          python -m pip install --upgrade pip
          # 安裝基礎穩定套件
          pip install discord.py httpx numpy pandas aiofiles
          # 使用 ZIP 壓縮包直接安裝，避開 Git 驗證錯誤
          pip install https://github.com/twopiradians/pandas-ta/archive/development.zip

      - name: 4. 啟動分析員
        env:
          # 確保您的 GitHub Secrets 中有名稱為 DISCORD_TOKEN 的資料
          DISCORD_TOKEN: ${{ secrets.DISCORD_TOKEN }}
        run: python main.py